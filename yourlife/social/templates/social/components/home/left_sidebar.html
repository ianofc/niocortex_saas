
<aside class="sticky hidden space-y-6 lg:block lg:col-span-3 top-24">
    <div class="glass-panel rounded-[2.5rem] p-6 text-center border border-white/40 shadow-xl relative overflow-hidden group">
        <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-br from-violet-500/20 to-fuchsia-500/20 blur-xl"></div>
        <div class="relative z-10 mt-4">
            <div class="w-24 h-24 p-1 mx-auto border rounded-full shadow-lg border-white/50 bg-white/20 backdrop-blur-md">
                <img src="{% if user.avatar %}{{ user.avatar.url }}{% else %}https://ui-avatars.com/api/?name={{ user.first_name }}&background=random&color=fff{% endif %}" class="object-cover w-full h-full rounded-full">
            </div>
            <h2 class="mt-4 text-lg font-bold text-slate-800 font-display">{{ user.get_full_name }}</h2>
            <p class="mb-6 text-xs font-bold tracking-widest uppercase text-slate-500">@{{ user.username }}</p>
            <div class="grid grid-cols-3 gap-2 py-4 mb-4 border-y border-white/30 bg-white/5 rounded-2xl">
                <div><span class="block font-bold text-slate-800">12</span><span class="text-[9px] uppercase text-slate-500">Posts</span></div>
                <div><span class="block font-bold text-slate-800">84</span><span class="text-[9px] uppercase text-slate-500">Amigos</span></div>
                <div><span class="block font-bold text-slate-800">5</span><span class="text-[9px] uppercase text-slate-500">Nível</span></div>
            </div>
            <a href="{% url 'yourlife_social:meu_perfil' %}" class="block w-full py-3 bg-slate-800 text-white rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-violet-600 transition shadow-lg transform hover:-translate-y-0.5">
                Ver Perfil
            </a>
        </div>
    </div>
    <div class="glass-panel p-4 rounded-[2rem] border border-white/30 space-y-2">
        <a href="{% url 'yourlife_social:groups_list' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-bold transition text-slate-600 hover:bg-white/40 hover:text-violet-600 rounded-xl"><i class="w-5 fas fa-users"></i> Comunidades</a>
        <a href="{% url 'yourlife_social:events_list' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-bold transition text-slate-600 hover:bg-white/40 hover:text-violet-600 rounded-xl"><i class="w-5 fas fa-calendar-alt"></i> Eventos</a>
    </div>
</aside>
