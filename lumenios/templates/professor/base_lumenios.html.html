{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumenios | Painel do Professor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: { lumenios: { purple: '#A435F0', dark: '#1C1D1F' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #E2E8F0;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col relative" x-data="{ userMenuOpen: false }">

    <nav class="sticky top-0 z-50 w-full px-6 py-3 bg-white border-b border-slate-200">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="{% url 'lumenios:dashboard_professor' %}" class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded bg-slate-900 flex items-center justify-center text-white font-bold">L</div>
                    <span class="font-display font-bold text-lg">Lumenios <span class="text-xs bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-sans">DOCENTE</span></span>
                </a>

                <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                    <a href="{% url 'lumenios:dashboard_professor' %}" class="text-slate-900 hover:text-purple-600 transition">Meus Cursos</a>
                    <a href="#" class="text-slate-500 hover:text-purple-600 transition">Analíticos</a>
                    <a href="#" class="text-slate-500 hover:text-purple-600 transition">Comunidade</a>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <a href="{% url 'lumenios:criar_curso' %}" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold rounded-lg transition shadow-sm flex items-center gap-2">
                    <i class="fas fa-plus"></i> Novo Curso
                </a>
                
                <div class="h-6 w-px bg-slate-200"></div>

                <a href="{% url 'core:professor_dashboard' %}" class="text-xs font-bold text-slate-500 hover:text-slate-800" title="Voltar ao NioCortex">
                    <i class="fas fa-th"></i>
                </a>

                <div class="relative" @click.away="userMenuOpen = false">
                    <button @click="userMenuOpen = !userMenuOpen" class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden">
                            {% if user.avatar %}
                                <img src="{{ user.avatar.url }}" class="w-full h-full object-cover">
                            {% else %}
                                <div class="w-full h-full flex items-center justify-center text-slate-500 font-bold text-xs">{{ user.first_name|first }}</div>
                            {% endif %}
                        </div>
                    </button>
                    <div x-show="userMenuOpen" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-slate-100 py-1" style="display: none;">
                        <div class="px-4 py-2 border-b border-slate-50 text-xs text-slate-500">Logado como Professor</div>
                        <a href="{% url 'core:logout' %}" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">Sair</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="relative z-10">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
