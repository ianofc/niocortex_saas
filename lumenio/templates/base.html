<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumenio | AVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        lumenio: {
                            purple: '#A435F0', // Roxo estilo Udemy
                            dark: '#1C1D1F',   // Preto suave
                            light: '#F7F9FA',  // Fundo cinza claro
                            blue: '#0056D2'    // Azul estácio
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F7F9FA; }
        /* Estilização da barra de rolagem para ficar elegante */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-white shadow-sm border-b border-gray-200 h-16 flex items-center justify-between px-6 fixed w-full z-50 top-0">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Lumenio</h1>
            <span class="text-xs font-semibold bg-lumenio-purple text-white px-2 py-0.5 rounded">BETA</span>
        </div>
        
        <div class="flex items-center gap-4">
            {% if user.is_authenticated %}
                <span class="text-sm font-medium">Olá, {{ user.first_name }}</span>
                <a href="#" class="text-sm text-red-600 hover:text-red-800">Sair</a>
            {% else %}
                <a href="#" class="text-sm font-bold text-gray-700">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="pt-16">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
