<h1>Login - NioCortex Lumina</h1>
{% if messages %}
    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}
{% endif %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Entrar</button>
</form>
<p>Novo usuário? <a href="{% url 'core:register' %}">Crie sua conta freemium</a></p>
