<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NioCortex | Meu Estudo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#F8FAFC] text-slate-800 font-sans">

    <nav class="bg-white px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="font-black text-xl tracking-tight text-slate-800">
            NioCortex <span class="text-teal-500 font-normal text-sm ml-1">Student</span>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm font-bold text-slate-600">{{ user.username }}</span>
            <a href="{% url 'core:logout' %}" class="text-red-400 hover:text-red-600"><i class="fas fa-power-off"></i></a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6">
        
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">O que vamos aprender hoje?</h1>
            <p class="text-slate-500">Seu assistente pessoal de evolução contínua.</p>
        </header>

        <div class="max-w-2xl mx-auto bg-white p-2 rounded-full shadow-lg border border-gray-200 flex items-center mb-12 transform hover:scale-105 transition duration-300">
            <div class="pl-4 pr-2 text-teal-500">
                <i class="fas fa-sparkles text-xl"></i>
            </div>
            <input type="text" placeholder="Ex: Quero estudar sobre a Revolução Industrial..." 
                   class="w-full bg-transparent border-none focus:ring-0 text-lg p-2 outline-none text-slate-700 placeholder-slate-400">
            <button class="bg-teal-500 hover:bg-teal-600 text-white rounded-full px-6 py-3 font-bold transition">
                Gerar Plano
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-bold">História</span>
                    <span class="text-xs text-gray-400">45% Concluído</span>
                </div>
                <h3 class="font-bold text-lg mb-2">Idade Média</h3>
                <div class="w-full bg-gray-100 rounded-full h-2 mb-4">
                    <div class="bg-orange-400 h-2 rounded-full" style="width: 45%"></div>
                </div>
                <button class="w-full border border-slate-200 text-slate-600 py-2 rounded-lg text-sm font-bold hover:bg-slate-50">
                    Continuar
                </button>
            </div>

            <div class="border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center p-6 text-slate-400 hover:border-teal-400 hover:text-teal-500 transition cursor-pointer h-full min-h-[200px]">
                <i class="fas fa-plus-circle text-4xl mb-2"></i>
                <span class="font-bold text-sm">Novo Tópico</span>
            </div>

        </div>
    </main>

</body>
</html>
