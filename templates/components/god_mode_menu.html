{% if user.is_authenticated and user.is_superuser %}
<div class="relative group" x-data="{ open: false }">
    <button @click="open = !open" @click.away="open = false" class="flex items-center gap-2 px-3 py-1.5 bg-slate-800 text-white rounded-lg hover:bg-black transition shadow-lg border border-slate-700 text-xs font-bold uppercase tracking-wide">
        <i class="fas fa-eye text-[#FFD700]"></i>
        <span>Visão (God Mode)</span>
    </button>
    
    <div x-show="open" 
         class="absolute right-0 z-50 w-56 mt-3 overflow-hidden border border-gray-200 shadow-2xl bg-white/90 backdrop-blur-md rounded-xl"
         style="display: none;"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 transform scale-95"
         x-transition:enter-end="opacity-100 transform scale-100">
        
        <div class="p-1">
            <div class="px-3 py-2 text-[10px] font-bold text-gray-400 uppercase tracking-wider border-b border-gray-100 mb-1">
                Alternar Visão
            </div>

            <a href="{% url 'admin:index' %}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-bold text-slate-600 hover:bg-[#6200EA] hover:text-white transition-colors">
                <i class="w-5 fas fa-cogs"></i> Django Admin
            </a>

            <a href="{% url 'core:corporate_dashboard' %}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-bold text-slate-600 hover:bg-[#6200EA] hover:text-white transition-colors">
                <i class="w-5 fas fa-building"></i> Visão Direção
            </a>

            <a href="{% url 'core:professor_dashboard' %}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-bold text-slate-600 hover:bg-[#6200EA] hover:text-white transition-colors">
                <i class="w-5 fas fa-chalkboard-teacher"></i> Visão Professor
            </a>

            <a href="{% url 'core:aluno_dashboard' %}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-bold text-slate-600 hover:bg-[#6200EA] hover:text-white transition-colors">
                <i class="w-5 fas fa-user-graduate"></i> Visão Aluno
            </a>
        </div>
    </div>
</div>
{% endif %}
