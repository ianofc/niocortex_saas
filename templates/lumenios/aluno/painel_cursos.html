{% extends "lumenios/base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto w-full px-6 py-10">
    
    <div class="flex flex-col md:flex-row justify-between items-end mb-10 pb-6 border-b border-slate-200">
        <div>
            <h1 class="text-4xl font-display font-bold text-slate-900 mb-2">Meus Cursos</h1>
            <p class="text-slate-500">Bem-vindo ao seu ambiente de foco.</p>
        </div>
        <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200 mt-4 md:mt-0">
            <button class="px-4 py-1.5 rounded-lg text-xs font-bold bg-teal-50 text-teal-700">Em andamento</button>
            <button class="px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 hover:bg-slate-50">Concluídos</button>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        {% for sala in salas %}
        <a href="{% url 'lumenios:aluno_player' sala.id %}" class="group bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-2xl hover:shadow-teal-900/10 transition-all duration-300 hover:-translate-y-1">
            <div class="aspect-video bg-slate-100 relative overflow-hidden">
                {% if sala.capa %}
                    <img src="{{ sala.capa.url }}" class="w-full h-full object-cover transition duration-700 group-hover:scale-105">
                {% else %}
                    <div class="w-full h-full bg-gradient-to-br from-slate-200 to-slate-300 flex items-center justify-center">
                        <i class="fas fa-book-open text-4xl text-slate-400"></i>
                    </div>
                {% endif %}
                <div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition flex items-center justify-center opacity-0 group-hover:opacity-100">
                    <div class="w-12 h-12 bg-white/90 backdrop-blur rounded-full flex items-center justify-center text-teal-600 shadow-lg transform scale-50 group-hover:scale-100 transition duration-300">
                        <i class="fas fa-play ml-1"></i>
                    </div>
                </div>
            </div>
            
            <div class="p-5">
                <div class="text-[10px] font-bold text-teal-600 uppercase tracking-wider mb-1">{{ sala.turma.nome }}</div>
                <h3 class="font-bold text-lg text-slate-800 leading-snug mb-2 group-hover:text-teal-600 transition">{{ sala.disciplina.nome }}</h3>
                
                <div class="mt-4">
                    <div class="flex justify-between text-[10px] text-slate-400 mb-1">
                        <span>Progresso</span>
                        <span>32%</span>
                    </div>
                    <div class="h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-teal-500 w-1/3"></div>
                    </div>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
