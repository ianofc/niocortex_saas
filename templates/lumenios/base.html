{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lumenios | Ambiente de Aula{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' } // Indigo Theme
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; } /* Dark Mode Default para Imersão */
        .glass-header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col overflow-hidden">

    <nav class="glass-header h-16 flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-4">
            <a href="{% url 'lumenios:aluno_painel' %}" class="flex items-center gap-2 hover:opacity-80 transition">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-500/30">L</div>
                <span class="font-display font-bold text-lg tracking-tight text-white hidden md:block">Lumenios</span>
            </a>
            <div class="h-6 w-px bg-slate-700 mx-2 hidden md:block"></div>
            {% block header_content %}{% endblock %}
        </div>

        <div class="flex items-center gap-4">
            <a href="{% url 'core:dashboard' %}" class="text-xs font-bold text-slate-400 hover:text-white transition flex items-center gap-2 px-3 py-1.5 rounded-full hover:bg-white/5">
                <i class="fas fa-sign-out-alt"></i> <span class="hidden md:inline">Sair da Aula</span>
            </a>
            <div class="w-8 h-8 rounded-full p-[1px] bg-gradient-to-r from-indigo-500 to-purple-500">
                <img src="{% if user.avatar %}{{ user.avatar.url }}{% else %}https://i.pravatar.cc/150?img=12{% endif %}" class="w-full h-full rounded-full object-cover border-2 border-slate-900">
            </div>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden relative">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
