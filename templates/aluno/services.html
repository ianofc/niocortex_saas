{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth bg-[#F0F2F5]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretaria Virtual | NioStudent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: { nio: { 500: '#7c3aed', 600: '#6d28d9' } }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .neural-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased min-h-screen relative bg-[#F0F2F5]">

    <div class="absolute inset-0 pointer-events-none neural-bg opacity-30"></div>

    <nav class="sticky top-0 z-40 flex items-center justify-between w-full px-6 py-3 shadow-sm glass-panel">
        <a href="{% url 'core:aluno_dashboard' %}" class="flex items-center gap-2 transition hover:opacity-80">
            <div class="flex items-center justify-center w-8 h-8 font-bold text-white rounded-lg bg-nio-600">N</div>
            <span class="font-bold font-display text-slate-800">Voltar ao Feed</span>
        </a>
        <h1 class="text-lg font-bold font-display text-nio-700">Secretaria Virtual</h1>
        <div class="w-8"></div>
    </nav>

    <main class="relative z-10 max-w-5xl p-6 mx-auto">
        
        <div class="mb-10">
            <h2 class="mb-6 text-xl font-bold font-display text-slate-900">O que você precisa hoje?</h2>
            
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
                <button class="flex flex-col items-center justify-center gap-3 p-6 text-center transition glass-card rounded-2xl hover:-translate-y-1 hover:shadow-md group">
                    <div class="flex items-center justify-center w-12 h-12 text-xl text-blue-600 transition bg-blue-50 rounded-xl group-hover:bg-blue-600 group-hover:text-white">
                        <i class="fas fa-file-contract"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">Declaração de Matrícula</span>
                </button>

                <button class="flex flex-col items-center justify-center gap-3 p-6 text-center transition glass-card rounded-2xl hover:-translate-y-1 hover:shadow-md group">
                    <div class="flex items-center justify-center w-12 h-12 text-xl text-purple-600 transition bg-purple-50 rounded-xl group-hover:bg-purple-600 group-hover:text-white">
                        <i class="fas fa-history"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">Histórico Escolar</span>
                </button>

                <button class="flex flex-col items-center justify-center gap-3 p-6 text-center transition glass-card rounded-2xl hover:-translate-y-1 hover:shadow-md group">
                    <div class="flex items-center justify-center w-12 h-12 text-xl text-pink-600 transition bg-pink-50 rounded-xl group-hover:bg-pink-600 group-hover:text-white">
                        <i class="fas fa-id-card"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">Carteirinha Estudantil</span>
                </button>

                <button class="flex flex-col items-center justify-center gap-3 p-6 text-center transition glass-card rounded-2xl hover:-translate-y-1 hover:shadow-md group">
                    <div class="flex items-center justify-center w-12 h-12 text-xl text-orange-600 transition bg-orange-50 rounded-xl group-hover:bg-orange-600 group-hover:text-white">
                        <i class="fas fa-headset"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">Falar com a Secretaria</span>
                </button>
            </div>
        </div>

        <div>
            <h2 class="mb-4 text-xl font-bold font-display text-slate-900">Acompanhamento</h2>
            <div class="space-y-4">
                
                <div class="flex items-center justify-between p-4 border-l-4 glass-card rounded-xl border-l-green-500">
                    <div class="flex items-center gap-4">
                        <div class="w-12 text-center">
                            <p class="text-xs font-bold uppercase text-slate-400">DEZ</p>
                            <p class="text-xl font-bold text-slate-800">18</p>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-slate-800">Declaração de Matrícula (PDF)</h4>
                            <p class="text-xs text-slate-500">Protocolo: #REQ-2025-8821</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="px-3 py-1 text-xs font-bold text-green-700 bg-green-100 rounded-full">Concluído</span>
                        <button class="flex items-center justify-center w-8 h-8 transition rounded-lg bg-slate-100 text-nio-600 hover:bg-nio-600 hover:text-white" title="Baixar">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between p-4 border-l-4 glass-card rounded-xl border-l-yellow-500">
                    <div class="flex items-center gap-4">
                        <div class="w-12 text-center">
                            <p class="text-xs font-bold uppercase text-slate-400">DEZ</p>
                            <p class="text-xl font-bold text-slate-800">20</p>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-slate-800">2ª Via Carteirinha</h4>
                            <p class="text-xs text-slate-500">Protocolo: #REQ-2025-9012</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="flex items-center gap-1 px-3 py-1 text-xs font-bold text-yellow-700 bg-yellow-100 rounded-full">
                            <i class="fas fa-spinner fa-spin text-[10px]"></i> Em Análise
                        </span>
                        <button class="cursor-not-allowed text-slate-400" disabled><i class="fas fa-download"></i></button>
                    </div>
                </div>

            </div>
        </div>

    </main>
</body>
</html>
