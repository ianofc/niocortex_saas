{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth bg-[#F0F2F5]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletim Escolar | NioStudent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: {
                        nio: { 50: '#f2f0ff', 500: '#7c3aed', 600: '#6d28d9', 900: '#3e1a75' },
                        lumina: { cyan: '#00E5FF' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-table-row { background: rgba(255, 255, 255, 0.6); transition: all 0.2s; }
        .glass-table-row:hover { background: rgba(255, 255, 255, 0.9); transform: scale(1.01); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .neural-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased min-h-screen relative bg-[#F0F2F5]">

    <div class="absolute inset-0 pointer-events-none neural-bg opacity-30"></div>

    <nav class="sticky top-0 z-40 flex items-center justify-between w-full px-6 py-3 shadow-sm glass-panel">
        <a href="{% url 'core:aluno_dashboard' %}" class="flex items-center gap-2 transition hover:opacity-80">
            <div class="flex items-center justify-center w-8 h-8 font-bold text-white rounded-lg bg-nio-600">N</div>
            <span class="font-bold font-display text-slate-800">Voltar ao Feed</span>
        </a>
        <h1 class="text-lg font-bold font-display text-nio-700">Boletim Escolar 2025</h1>
        <button class="flex items-center justify-center w-8 h-8 transition rounded-full bg-slate-200 text-slate-600 hover:bg-nio-600 hover:text-white" title="Imprimir/PDF">
            <i class="fas fa-print"></i>
        </button>
    </nav>

    <main class="relative z-10 max-w-5xl p-6 mx-auto" x-data="{ term: '1' }">
        
        <div class="flex justify-center mb-8">
            <div class="flex p-1 border shadow-sm bg-white/60 backdrop-blur rounded-2xl border-white/40">
                <button @click="term = '1'" :class="term === '1' ? 'bg-nio-600 text-white shadow-md' : 'text-slate-500 hover:bg-white/50'" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all">1º Bimestre</button>
                <button @click="term = '2'" :class="term === '2' ? 'bg-nio-600 text-white shadow-md' : 'text-slate-500 hover:bg-white/50'" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all">2º Bimestre</button>
                <button @click="term = '3'" :class="term === '3' ? 'bg-nio-600 text-white shadow-md' : 'text-slate-500 hover:bg-white/50'" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all">3º Bimestre</button>
                <button @click="term = '4'" :class="term === '4' ? 'bg-nio-600 text-white shadow-md' : 'text-slate-500 hover:bg-white/50'" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all">4º Bimestre</button>
            </div>
        </div>

        <div class="space-y-3">
            
            <div class="grid grid-cols-12 gap-4 px-6 py-2 text-xs font-bold tracking-wider uppercase text-slate-400">
                <div class="col-span-4">Disciplina</div>
                <div class="col-span-2 text-center">Av. 1</div>
                <div class="col-span-2 text-center">Av. 2</div>
                <div class="col-span-2 text-center">Trabalhos</div>
                <div class="col-span-2 text-right">Média Final</div>
            </div>

            <div class="grid items-center grid-cols-12 gap-4 px-6 py-4 border rounded-2xl glass-table-row border-white/50">
                <div class="flex items-center col-span-4 gap-3">
                    <div class="flex items-center justify-center w-10 h-10 text-blue-600 bg-blue-100 rounded-lg"><i class="fas fa-calculator"></i></div>
                    <span class="font-bold text-slate-800">Matemática</span>
                </div>
                <div class="col-span-2 font-mono text-center text-slate-600">9.0</div>
                <div class="col-span-2 font-mono text-center text-slate-600">10.0</div>
                <div class="col-span-2 font-mono text-center text-slate-600">9.5</div>
                <div class="col-span-2 text-right">
                    <span class="px-3 py-1 font-black text-green-700 bg-green-100 border border-green-200 rounded-lg">9.5</span>
                </div>
            </div>

            <div class="grid items-center grid-cols-12 gap-4 px-6 py-4 border rounded-2xl glass-table-row border-white/50">
                <div class="flex items-center col-span-4 gap-3">
                    <div class="flex items-center justify-center w-10 h-10 text-orange-600 bg-orange-100 rounded-lg"><i class="fas fa-scroll"></i></div>
                    <span class="font-bold text-slate-800">História</span>
                </div>
                <div class="col-span-2 font-mono text-center text-slate-600">6.5</div>
                <div class="col-span-2 font-mono text-center text-slate-600">7.0</div>
                <div class="col-span-2 font-mono text-center text-slate-600">7.5</div>
                <div class="col-span-2 text-right">
                    <span class="px-3 py-1 font-black text-yellow-700 bg-yellow-100 border border-yellow-200 rounded-lg">7.0</span>
                </div>
            </div>

            <div class="grid items-center grid-cols-12 gap-4 px-6 py-4 border rounded-2xl glass-table-row border-white/50 bg-red-50/30">
                <div class="flex items-center col-span-4 gap-3">
                    <div class="flex items-center justify-center w-10 h-10 text-red-600 bg-red-100 rounded-lg"><i class="fas fa-atom"></i></div>
                    <span class="font-bold text-slate-800">Física</span>
                </div>
                <div class="col-span-2 font-mono text-center text-slate-600">4.5</div>
                <div class="col-span-2 font-mono text-center text-slate-600">5.0</div>
                <div class="col-span-2 font-mono text-center text-slate-600">6.0</div>
                <div class="col-span-2 text-right">
                    <span class="px-3 py-1 font-black text-red-700 bg-red-100 border border-red-200 rounded-lg">5.1</span>
                </div>
            </div>

        </div>

        <div class="flex justify-end gap-6 mt-8 text-sm">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span> Aprovado
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-yellow-500 rounded-full"></span> Recuperação
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-red-500 rounded-full"></span> Reprovado
            </div>
        </div>

    </main>

</body>
</html>
